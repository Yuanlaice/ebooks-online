<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EbookStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Círculos animados */
        .circles-container {
            position: absolute;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        .circle:nth-child(1) {
            width: 300px;
            height: 300px;
            animation-duration: 15s;
        }

        .circle:nth-child(2) {
            width: 350px;
            height: 350px;
            animation-duration: 20s;
            animation-direction: reverse;
        }

        .circle:nth-child(3) {
            width: 400px;
            height: 400px;
            animation-duration: 25s;
        }

        .circle:nth-child(4) {
            width: 450px;
            height: 450px;
            animation-duration: 18s;
            animation-direction: reverse;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Container do formulário */
        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Campos de input */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            background: transparent;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Botão de login */
        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: linear-gradient(135deg, #4a148c 0%, #c2185b 50%, #e91e63 100%);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(233, 30, 99, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(233, 30, 99, 0.6);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Links */
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding: 0 10px;
        }

        .links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #fff;
        }

        /* Tabs Login/Cadastro */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab {
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 10px 20px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #fff;
            border-bottom-color: #e91e63;
        }

        .tab:hover {
            color: #fff;
        }

        /* Formulários */
        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Notificação */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .notification.success {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        }

        .notification.error {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 40px 25px;
            }

            .circles-container {
                width: 350px;
                height: 350px;
            }

            .circle:nth-child(1) { width: 250px; height: 250px; }
            .circle:nth-child(2) { width: 280px; height: 280px; }
            .circle:nth-child(3) { width: 310px; height: 310px; }
            .circle:nth-child(4) { width: 340px; height: 340px; }
        }
    </style>
</head>
<body>
    <!-- Círculos animados -->
    <div class="circles-container">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Container de Login -->
    <div class="login-container">
        <h1>Login</h1>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Entrar</div>
            <div class="tab" onclick="switchTab('signup')">Cadastrar</div>
        </div>

        <!-- Formulário de Login -->
        <div id="login-form" class="form-content active">
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="email" id="login-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Senha" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            <div class="links">
                <a href="#" onclick="showForgotPassword()">Esqueci a senha</a>
            </div>
        </div>

        <!-- Formulário de Cadastro -->
        <div id="signup-form" class="form-content">
            <form onsubmit="handleSignup(event)">
                <div class="input-group">
                    <input type="text" id="signup-name" placeholder="Nome completo" required>
                </div>
                <div class="input-group">
                    <input type="email" id="signup-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="signup-password" placeholder="Senha (mínimo 6 caracteres)" required minlength="6">
                </div>
                <button type="submit" class="btn-login">Cadastrar</button>
            </form>
        </div>
    </div>

    <!-- Notificação -->
    <div id="notification" class="notification"></div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase-config.js"></script>

    <script>
        // Verificar se já está logado
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Já logado, redirecionar para loja
                window.location.href = 'ebook-store.html';
            }
        }

        // Trocar entre login e cadastro
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        }

        // Mostrar notificação
        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification ${type}`;
            notif.style.display = 'block';

            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }

        // Login
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    showNotification('Email ou senha incorretos', 'error');
                    return;
                }

                showNotification('Login realizado com sucesso!');
                
                // Redirecionar para loja após 1 segundo
                setTimeout(() => {
                    window.location.href = 'ebook-store.html';
                }, 1000);

            } catch (error) {
                showNotification('Erro ao fazer login', 'error');
            }
        }

        // Cadastro
        async function handleSignup(e) {
            e.preventDefault();
            
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { full_name: name }
                    }
                });

                if (error) {
                    showNotification(error.message, 'error');
                    return;
                }

                // Criar perfil
                await supabase.from('profiles').insert([{
                    id: data.user.id,
                    full_name: name,
                    email: email,
                    created_at: new Date().toISOString()
                }]);

                showNotification('Cadastro realizado! Verifique seu email.');
                
                // Voltar para login após 2 segundos
                setTimeout(() => {
                    switchTab('login');
                }, 2000);

            } catch (error) {
                showNotification('Erro ao cadastrar', 'error');
            }
        }

        // Esqueci senha
        function showForgotPassword() {
            const email = prompt('Digite seu email para recuperar a senha:');
            if (email) {
                supabase.auth.resetPasswordForEmail(email);
                showNotification('Email de recuperação enviado!');
            }
        }

        // Inicializar
        checkAuth();
    </script>
</body>
</html>
